on:
  repository_dispatch:
    types: [CI_trigger_type]
    inputs:
      target_repo:
        required: true
        default:  "matthiasbschaefer/ModelicaStandardLibrary"
      body:
        required: true
        default: "Please look here for details: "
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Previous step
        id: prev
        run: |
          echo "number: ${{ github.event.client_payload.number }}"
          echo "head_sha: ${{ github.event.client_payload.head_sha }}"
          echo "base_sha: ${{ github.event.client_payload.base_sha }}"

  review:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pull-requests: write
    steps:
      - name: Decide review event
        id: decide
        run: |
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "event=approve" >> "$GITHUB_OUTPUT"
          else
            echo "event=request_changes" >> "$GITHUB_OUTPUT"
          fi
      - name: Create review in other repo
        env:
          GH_TOKEN: ${{ secrets.MODELICA_TOKEN }}
          TARGET_REPO: "matthiasbschaefer/ModelicaStandardLibrary"
          TARGET_PR:   ${{ github.event.client_payload.number }}
          EVENT:       ${{ steps.decide.outputs.event }}
          BODY:        "Please look here for details: https://serv.ltx.de/prs/${{ github.event.client_payload.number }}/Modelica/report/PR_comparison_report.html and https://serv.ltx.de/prs/${{ github.event.client_payload.number }}/ModelicaTest/report/PR_comparison_report.html"

        run: |
          API="https://api.github.com/repos/${TARGET_REPO}/pulls/${TARGET_PR}/reviews"
          curl -sS -X POST "$API" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "{\"event\":\"${EVENT}\",\"body\":$(jq -Rs . <<< "$BODY")}"

