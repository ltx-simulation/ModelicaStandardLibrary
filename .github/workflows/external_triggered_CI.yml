on:
  repository_dispatch:
    types: [CI_trigger_type]

env:
    EVENT_NUMBER:  ${{ github.event.client_payload.number }}
    BASE_SHA: ${{ github.event.client_payload.base_sha }}
    PR_SHA: ${{ github.event.client_payload.head_sha }}
    REPO_NAME: ${{ github.event.client_payload.github_repo }}
    #WORKSPACE: ${{ github.workspace }}
    PR_SERVER: ${{ vars.LTX_PR_SERVER }}
    # WORKSPACE: $GITHUB_WORKSPACE


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Previous step
        id: prev
        run: |
          echo "number: ${{ github.event.client_payload.number }}"
          echo "head_sha: ${{ github.event.client_payload.head_sha }}"
          echo "base_sha: ${{ github.event.client_payload.base_sha }}"
  
  
  run_dymola:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/matthiasbschaefer/dymola_image:latest
      options: --user=resimuser --rm
      credentials:
        username: ${{ secrets.GHCR_USER }}
        password: ${{ secrets.GHCR_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with: 
            persist-credentials: false
            fetch-depth: 0
            repository: ${{ env.REPO_NAME }}
      
      - name: prepare
        run: /work/run_scripts/prepare_tool.sh $GITHUB_WORKSPACE ${{ env.EVENT_NUMBER }} ${{ env.BASE_SHA }} ${{ env.PR_SHA }} dymola
        
      - name: run
        run: /work/run_scripts/run_tool.sh $GITHUB_WORKSPACE ${{ env.EVENT_NUMBER }} ${{ env.BASE_SHA }} dymola


  
  run_openmodelica:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/matthiasbschaefer/om_image:latest
      options: --user=resimuser --rm
      credentials:
        username: ${{ secrets.GHCR_USER }}
        password: ${{ secrets.GHCR_TOKEN }}
        repository: ${{ env.REPO_NAME }}

    steps:
      - uses: actions/checkout@v6
        with: 
            persist-credentials: false
            fetch-depth: 0
      
      - name: prepare
        run: /work/run_scripts/prepare_tool.sh $GITHUB_WORKSPACE ${{ env.EVENT_NUMBER }} ${{ env.BASE_SHA }} ${{ env.PR_SHA }} om
        
      - name: run
        run: /work/run_scripts/run_tool.sh $GITHUB_WORKSPACE ${{ env.EVENT_NUMBER }} ${{ env.BASE_SHA }} om



  overview:
    runs-on: ubuntu-latest
    needs: [run_openmodelica, run_dymola]
    if: always()
    container:
      image: ghcr.io/matthiasbschaefer/om_image:latest
      options: --user=resimuser --rm
      credentials:
        username: ${{ secrets.GHCR_USER }}
        password: ${{ secrets.GHCR_TOKEN }}
  
    
    steps:
      - name: create_overview
        run: /work/run_scripts/create_overview.sh ${{ env.EVENT_NUMBER }}
      - name: publish
        run: /work/run_scripts/publish_reports.sh ${{ env.EVENT_NUMBER }}   



  review:
    runs-on: ubuntu-latest
    needs: [run_openmodelica, run_dymola, overview]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Decide review event
        id: decide
        run: |
          if [ "${{ needs.run_openmodelica.result }}" = "success" ] &&  [ "${{ needs.run_dymola.result }}" = "success" ]; then
            echo "event=APPROVE" >> "$GITHUB_OUTPUT"
          else
            echo "event=REQUEST_CHANGES" >> "$GITHUB_OUTPUT"
          fi
      - name: Create review in other repo
        env:
          GH_TOKEN: ${{ secrets.MODELICA_TOKEN }}
          TARGET_REPO: "matthiasbschaefer/ModelicaStandardLibrary"
          TARGET_PR:   ${{ github.event.client_payload.number }}
          EVENT:       ${{ steps.decide.outputs.event }}
          BODY:        "Please look here for details:${{ env.PR_SERVER }}/${{ env.EVENT_NUMBER }}/Modelica/PR_comparison_report.html and ${{ env.PR_SERVER }}/${{ env.EVENT_NUMBER }}/ModelicaTest/PR_comparison_report.html"

        run: |
          API="https://api.github.com/repos/${TARGET_REPO}/pulls/${TARGET_PR}/reviews"
          curl -sS -X POST "$API" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "{\"event\":\"${EVENT}\",\"body\":$(jq -Rs . <<< "$BODY")}"

